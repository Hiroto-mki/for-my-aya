<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Valentine ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ffe6f0, #ffccdd);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Hearts floating animation */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.4);
            font-size: 24px;
            animation: floatUp 10s linear infinite;
            bottom: -50px;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Page container */
        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Floating box style */
        .floating-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.15);
            text-align: center;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 182, 193, 0.3);
            transform: translateY(0);
            animation: floatBox 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        
        .floating-box:hover {
            transform: translateY(-5px);
        }
        
        @keyframes floatBox {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* GIF styling */
        .gif-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 182, 193, 0.1);
            border: 2px dashed #ffb6c1;
        }
        
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }
        
        /* Text styling */
        .main-text {
            font-size: 2rem;
            color: #ff69b4;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
            line-height: 1.4;
        }
        
        /* Login form styling */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .input-group {
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d48ba6;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ffccdd;
            border-radius: 15px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            outline: none;
            color: #5a3d5c;
        }
        
        .input-group input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.1);
        }
        
        .input-group input::placeholder {
            color: #ccb3c0;
        }
        
        /* Login button */
        .btn-login {
            background: linear-gradient(to right, #ff69b4, #ff8ec7);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(255, 105, 180, 0.3);
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(255, 105, 180, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* Error message styling */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .error-gif {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .error-gif img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .error-text {
            font-size: 1.3rem;
            color: #ff6b6b;
            font-weight: 600;
            text-align: center;
        }
        
        .btn-back {
            background: linear-gradient(to right, #ff69b4, #ff8ec7);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(255, 105, 180, 0.3);
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(255, 105, 180, 0.4);
        }
        
        /* Proceed button */
        .btn-proceed {
            background: linear-gradient(to right, #ff69b4, #ff8ec7);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(255, 105, 180, 0.3);
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        
        .btn-proceed:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(255, 105, 180, 0.4);
        }
        
        /* Initially hidden pages */
        .hidden {
            display: none;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .floating-box {
                padding: 20px;
                width: 90%;
            }
            
            .main-text {
                font-size: 1.7rem;
            }
            
            .input-group input {
                padding: 10px 12px;
            }
            
            .btn-login {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
            
            .error-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating hearts background -->
    <div class="hearts-container" id="heartsContainer"></div>
    
    <!-- PAGE 1: Login Screen -->
    <div class="page" id="page1">
        <div class="floating-box">
            <div class="gif-container">
                <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExejl5eG9tNTF4OTh1ejR1MXhrZ3l6MG5kY2xnOTJ1Z2NncDJ6M2YyMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/opvdnsIBv1AciolLjk/giphy.gif" alt="Cute Valentine GIF">
            </div>
            <div class="main-text">HAIIII!!! ❤️</div>
            
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Your Name</label>
                    <input type="text" id="username" placeholder="Enter your name..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Secret Code</label>
                    <input type="password" id="password" placeholder="Enter password...">
                </div>
                <button type="submit" class="btn-login">Login ✨</button>
            </form>
        </div>
    </div>
    
    <!-- PAGE 2: Error Screen -->
    <div class="page hidden" id="page2">
        <div class="floating-box">
            <div class="error-container">
                <div class="error-gif">
                    <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHBhM3EwcWk1NHY1NmFwMGtqYmJkczl2dW85OGw3MjkyYXIxdzZyZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/QuCslOrnS649PSCnn7/giphy.gif" alt="Wrong Password">
                </div>
                <div class="error-text">No. You're not Aya.</div>
                <button class="btn-back" id="backToLoginBtn">← Back to Login</button>
            </div>
        </div>
    </div>
    
    <!-- PAGE 3: Success Screen -->
    <div class="page hidden" id="page3">
        <div class="floating-box">
            <div class="gif-container">
                <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMWJ3MGEzNHhqdW04ZWtqdnJnM3hmcG5uc3dvZnRseTUza3pqMmQ5MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/lpU91npgmwIvkrMVDK/giphy.gif" alt="Happy GIF">
            </div>
            <div class="main-text">YAYYYYYYYYY!!!</div>
            <a href="option.html" class="btn-proceed">Proceed →</a>
        </div>
    </div>
    
    <script>
        // Create floating hearts
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createHearts();
            
            // Get elements
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            // Login form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                
                // Check credentials
                if (username === "Aya" && password === "maki67") {
                    // Success - go to page 3
                    document.getElementById('page1').classList.add('hidden');
                    document.getElementById('page3').classList.remove('hidden');
                    
                    // Add celebration effect
                    for (let i = 0; i < 50; i++) {
                        setTimeout(() => {
                            createCelebrationHeart();
                        }, i * 100);
                    }
                } else {
                    // Error - go to page 2
                    document.getElementById('page1').classList.add('hidden');
                    document.getElementById('page2').classList.remove('hidden');
                    
                    // Clear inputs for next attempt
                    usernameInput.value = '';
                    passwordInput.value = '';
                }
            });
            
            // Back to login button
            const backToLoginBtn = document.getElementById('backToLoginBtn');
            backToLoginBtn.addEventListener('click', function() {
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('page1').classList.remove('hidden');
            });
            
            // Add Enter key support for login
            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    passwordInput.focus();
                }
            });
            
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
        });
        
        // Create celebration hearts for successful login
        function createCelebrationHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.style.position = 'fixed';
            heart.style.color = '#ff69b4';
            heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.zIndex = '9999';
            heart.style.pointerEvents = 'none';
            
            document.body.appendChild(heart);
            
            // Animate celebration heart
            const animation = heart.animate([
                { transform: 'translateY(0) scale(1)', opacity: 1 },
                { transform: 'translateY(-100vh) scale(1.5)', opacity: 0 }
            ], {
                duration: 1500,
                easing: 'cubic-bezier(0.215, 0.610, 0.355, 1)'
            });
            
            animation.onfinish = () => {
                heart.remove();
            };
        }
    </script>
</body>
</html>
